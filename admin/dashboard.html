<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      height: 100vh;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #2c3e50;
      color: #fff;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 10px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar ul li:hover {
      background: #34495e;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .header h1 {
      font-size: 20px;
      color: #333;
    }

    .logout-btn {
      padding: 8px 15px;
      border: none;
      background: #e74c3c;
      color: #fff;
      border-radius: 5px;
      cursor: pointer;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    /* Content */
    .content {
      padding: 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
      color: #555;
    }

    .card p {
      font-size: 20px;
      color: #2c3e50;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Admin</h2>
    <ul>
      <li>Dashboard</li>
      <li>Users</li>
      <li>Settings</li>
    </ul>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <h1>Dashboard</h1>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Content -->
    <div class="content">
      <div class="cards">
        <div class="card">
          <h3>Total Users</h3>
          <p>120</p>
        </div>

        <div class="card">
          <h3>Active Sessions</h3>
          <p>45</p>
        </div>

        <div class="card">
          <h3>Revenue</h3>
          <p>$2,500</p>
        </div>

        <div class="card">
          <h3>Notifications</h3>
          <p>8</p>
        </div>
      </div>
    </div>

  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

  <script>
    // 🔥 Firebase Configuration (SAME as login page)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Protect Page (Redirect if not logged in)
    auth.onAuthStateChanged((user) => {
      if (!user) {
        window.location.href = "../index.html";
      }
    });

    // Logout Function
    function logout() {
      auth.signOut().then(() => {
        window.location.href = "../index.html";
      });
    }
  </script>

</body>
</html>
