<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .login-container {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      outline: none;
      transition: 0.3s;
    }

    .form-group input:focus {
      border-color: #4facfe;
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #4facfe;
      border: none;
      color: #fff;
      font-size: 16px;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00c6ff;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2>Login</h2>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="Enter your email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button class="btn" id="loginBtn">Login</button>

    <div class="error" id="errorMsg"></div>
  </div>

  <!-- Firebase SDK -->
 

  <script type='module'>
 
	 import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
	import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-analytics.js";
	import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
	const firebaseConfig = {
		apiKey: "AIzaSyCt0Pa3m6Nd2OGfH-8Yw2GSNBK5THFgbZE",
		authDomain: "cbt-project-941e3.firebaseapp.com",
		projectId: "cbt-project-941e3",
		storageBucket: "cbt-project-941e3.firebasestorage.app",
		messagingSenderId: "717086718159",
		appId: "1:717086718159:web:23f23edae0529dfdb69fba",
		measurementId: "G-8JSGGTJ6S1"
	};


    // Initialize Firebase
   const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const auth = getAuth(app);

loginBtn.onclick = login;
    // Login Function
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("errorMsg");

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          // Redirect to dashboard
          window.location.href = "dashboard.html";
        })
        .catch((error) => {
          errorMsg.innerText = error.message;
        });
    }
  </script>

</body>
</html>
