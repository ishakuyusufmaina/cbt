<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DH CBT</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#f5f7fb; }
    header { display:flex; justify-content:space-between; align-items:center; padding:15px 20px; background:#1e3a8a; color:#fff; }
    header a { background:#fff; color:#1e3a8a; padding:8px 12px; text-decoration:none; border-radius:6px; }.filters { display:flex; gap:10px; padding:15px; background:#fff; flex-wrap:wrap; }
select { padding:8px; border-radius:6px; border:1px solid #ccc; }

.cards { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px,1fr)); gap:15px; padding:20px; }

.card { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1); cursor:pointer; transition:0.2s; }
.card:hover { transform:scale(1.02); }

.badge { display:inline-block; padding:4px 8px; border-radius:5px; font-size:12px; margin-right:5px; }
.published { background:#16a34a; color:#fff; }
.unpublished { background:#dc2626; color:#fff; }

.status-upcoming { background:#2563eb; color:#fff; }
.status-ongoing { background:#f59e0b; color:#fff; }
.status-past { background:#6b7280; color:#fff; }

.links a { margin-right:10px; color:#1e3a8a; text-decoration:none; font-weight:bold; }
.disabled { pointer-events:none; color:#aaa !important; }

  .filters, a[href="create-test.html"]{display: none}
  </style>
</head>
<body><header>
  <h2>Welcome to DH CBT</h2>
  <a href="create-test.html">+ Create New Test</a>
</header>
  <div class="filters">
  <select id="programFilter">
    <option value="">All Programs</option>
  </select>  <select id="publishFilter">
    <option value="">All</option>
    <option value="true">Published</option>
    <option value="false">Unpublished</option>
  </select>  <select id="statusFilter">
    <option value="">All Status</option>
    <option value="upcoming">Upcoming</option>
    <option value="ongoing">Ongoing</option>
    <option value="past">Past</option>
  </select>
</div>
  <div class="cards" id="cardsContainer"></div>
  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDWe6LmmWUGlWHv0zb13I6d0bGODfoRQtQ",
    authDomain: "nagari-polyclinic.firebaseapp.com",
    projectId: "nagari-polyclinic",
    storageBucket: "nagari-polyclinic.firebasestorage.app",
    messagingSenderId: "145295689654",
    appId: "1:145295689654:web:b97fb7bfe514ea47dea317",
    measurementId: "G-XL6Y1PB0N5"
  };
  

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const programFilter = document.getElementById('programFilter');
  const publishFilter = document.getElementById('publishFilter');
  const statusFilter = document.getElementById('statusFilter');
  const container = document.getElementById('cardsContainer');

  const programs = ["Program A", "Program B", "Program C"];

  programs.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    programFilter.appendChild(opt);
  });

  function getStatus(start, end) {
    const now = Date.now();
    if (now < start) return 'upcoming';
    if (now >= start && now <= end) return 'ongoing';
    return 'past';
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleString();
  }

  async function loadTests() {
    container.innerHTML = "Loading...";

    let q = collection(db, "tests");
    let constraints = [];

    if (programFilter.value) {
      constraints.push(where("for", "==", programFilter.value));
    }

    if (true /*publishFilter.value*/) {
      constraints.push(where("published", "==", true));
    }

    const finalQuery = constraints.length ? query(q, ...constraints) : q;

    const snapshot = await getDocs(finalQuery);

    container.innerHTML = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      const id = doc.id;

      const status = getStatus(data.startingTimestamp, data.endingTimestamp);

      if (statusFilter.value && status !== statusFilter.value) return;

      const card = document.createElement('div');
      card.className = 'card';
      console.log(status);
      card.innerHTML = `
        <div>
          <!--span class="badge ${data.published ? 'published' : 'unpublished'}">
            ${data.published ? 'Published' : 'Unpublished'}
          </span-->
          <span class="badge status-${status}">${status}</span>
        </div>

        <h3>${data.name}</h3>
        <p><strong>Program:</strong> ${data.for}</p>
        <p><strong>${status === 'upcoming' ? 'Starts' : 'Started'}:</strong> ${formatDate(data.startingTimestamp)}</p>
        <p><strong>${status === 'past' ? 'Ended' : 'Ends'}:</strong> ${formatDate(data.endingTimestamp)}</p>

        <!--div class="links">
          <a href="questions.html?testId=${id}" class="${status === 'ongoing' ? 'disabled' : ''}">Questions</a>
          <a href="submissions.html?testId=${id}">Submissions</a>
          <a href="test-proper.html?testId=${id}">Preview</a>

        </div-->
      `;

      card.addEventListener('click', () => {
        if (status!=="ongoing") return;
        window.location.href = `login.html?testId=${id}&program=${data.for}`;
      });

      container.appendChild(card);
    });
  }

  programFilter.addEventListener('change', loadTests);
  publishFilter.addEventListener('change', loadTests);
  statusFilter.addEventListener('change', loadTests);

  loadTests();
</script></body>
</html>
